services:
  mysql:
    image: mysql:8.4
    container_name: leave_portal_mysql
    restart: unless-stopped
    command:
      [
        "--character-set-server=utf8mb4",
        "--collation-server=utf8mb4_unicode_ci",
        "--default-time-zone=+00:00",
      ]
    environment:
      MYSQL_DATABASE: ${MYSQL_DATABASE:-leave_portal}
      MYSQL_USER: ${MYSQL_USER:-leave_portal_user}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:?MYSQL_PASSWORD must be set}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:?MYSQL_ROOT_PASSWORD must be set}
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - internal_network
    healthcheck:
      test:
        [
          "CMD-SHELL",
          'mysqladmin ping -h 127.0.0.1 -uroot -p"$$MYSQL_ROOT_PASSWORD" --silent',
        ]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s

  backend:
    build:
      context: ./backend
      args:
        DATABASE_URL: ${DATABASE_URL:-mysql://leave_portal_user:change-me@leave_portal_mysql:3306/leave_portal_cr}
    container_name: leave_portal_backend
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 5000
      DATABASE_URL: ${DATABASE_URL:-mysql://leave_portal_user:change-me@leave_portal_mysql:3306/leave_portal_cr}
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET must be set}
      FRONTEND_ORIGIN: ${FRONTEND_ORIGIN:-https://iitd.example.edu}
      CORS_ORIGIN: ${CORS_ORIGIN:-https://iitd.example.edu}
      FRONTEND_URL: ${FRONTEND_URL:-https://iitd.example.edu/leave-portal}
      BACKEND_URL: ${BACKEND_URL:-https://iitd.example.edu/api}
      EMAIL_SMTP_HOST: ${EMAIL_SMTP_HOST:-smtp.gmail.com}
      EMAIL_SMTP_PORT: ${EMAIL_SMTP_PORT:-465}
      EMAIL_SMTP_SECURE: ${EMAIL_SMTP_SECURE:-true}
      EMAIL_USER: ${EMAIL_USER:-}
      EMAIL_PASS: ${EMAIL_PASS:-}
      EMAIL_FROM: ${EMAIL_FROM:-}
      COMPANY_LOGO_URL: ${COMPANY_LOGO_URL:-}
      CALENDARIFIC_API_KEY: ${CALENDARIFIC_API_KEY:-}
    depends_on:
      mysql:
        condition: service_healthy
    ports:
      - "127.0.0.1:5000:5000"
    volumes:
      - backend_uploads:/app/uploads
    networks:
      - internal_network
    healthcheck:
      test:
        [
          "CMD-SHELL",
          'node -e "fetch(''http://127.0.0.1:5000/health'').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"',
        ]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-/api}
    container_name: leave_portal_frontend
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "127.0.0.1:4173:4173"
    networks:
      - internal_network
    healthcheck:
      test:
        [
          "CMD-SHELL",
          'node -e "fetch(''http://127.0.0.1:4173/'').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"',
        ]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s
  nginx:
    image: nginx:alpine
    container_name: leave_portal_nginx
    restart: unless-stopped
    depends_on:
      frontend:
        condition: service_healthy
      backend:
        condition: service_healthy
    ports:
      - "80:80"
    volumes:
      - ./csc-nginx.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - internal_network

networks:
  internal_network:
    driver: bridge


volumes:
  mysql_data:
  backend_uploads:
