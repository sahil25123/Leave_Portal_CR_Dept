server {
    listen 80;
    server_name _;

    client_max_body_size 25m;

    location = /leave-portal {
        return 301 /leave-portal/;
    }

    location ^~ /leave-portal/ {
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Prefix /leave-portal;
        proxy_pass http://leave_portal_frontend:4173/;
    }

    location ^~ /api/ {
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_pass http://leave_portal_backend:5000;
    }
}
